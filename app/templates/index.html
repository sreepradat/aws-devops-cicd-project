<!DOCTYPE html>
<html lang="en">
<head>
    <title>AWS DevOps Project</title>

    <style>
        body{
            background:#f4f7fb;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,.15);
        }

        .status{
            color:green;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="card">

<h1>{{ project_name }}</h1>

<p class="status">
Application is running successfully
</p>

<p>

Environment :

<b>{{ environment }}</b>

</p>

<p>

Health Endpoint :

<b>/health</b>

</p>

</div>

</body>

</html>
